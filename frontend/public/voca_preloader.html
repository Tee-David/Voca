<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOCA Preloader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #ffffff;
    --ring:        rgba(83, 74, 183, 0.09);
    --glow:        rgba(83, 74, 183, 0.18);
    --tagline:     #534AB7;
    --prog-bg:     rgba(83, 74, 183, 0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #0e0b1f;
      --ring:        rgba(175, 169, 236, 0.14);
      --glow:        rgba(83, 74, 183, 0.55);
      --tagline:     rgba(255,255,255,0.85);
      --prog-bg:     rgba(255,255,255,0.08);
    }
  }

  body {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
  }

  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Ripple rings */
  .rings {
    position: fixed;
    width: 340px; height: 340px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
  }
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--ring);
    animation: ripple 3.2s ease-out infinite;
  }
  .ring:nth-child(1) { animation-delay: 0s; }
  .ring:nth-child(2) { animation-delay: 0.8s; }
  .ring:nth-child(3) { animation-delay: 1.6s; }
  .ring:nth-child(4) { animation-delay: 2.4s; }
  @keyframes ripple {
    0%   { transform: scale(0.35); opacity: 0; }
    12%  { opacity: 1; }
    100% { transform: scale(2.8); opacity: 0; }
  }

  /* Stage */
  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  /* Glow behind wordmark */
  .glow-blob {
    position: absolute;
    width: 300px; height: 120px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
    filter: blur(24px);
    animation: pulse 3.2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.8; }
    50%       { transform: translate(-50%,-50%) scale(1.3); opacity: 1;   }
  }

  /* Wordmark */
  .wordmark-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .letter {
    font-size: 72px;
    font-weight: 800;
    color: #534AB7;
    line-height: 1;
    display: inline-block;
    animation: idleBounce 3.2s ease-in-out infinite;
  }
  .letter.lv { animation-delay: 0s;    margin-right: 6px; }
  .letter.lc { animation-delay: 0.16s; margin-right: -2px; }
  .letter.la { animation-delay: 0.24s; }

  .mic-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 54px; height: 72px;
    margin-right: 8px;
    animation: idleBounce 3.2s ease-in-out infinite;
    animation-delay: 0.08s;
  }
  @keyframes idleBounce {
    0%, 44%, 60%, 100% { transform: translateY(0); }
    52%                 { transform: translateY(-6px); }
  }

  .mic-active-bar {
    animation: activeBar 1.1s ease-in-out infinite alternate;
    transform-origin: center bottom;
  }
  @keyframes activeBar {
    from { transform: scaleY(0.35); opacity: 0.6; }
    to   { transform: scaleY(1);    opacity: 1;   }
  }

  /* EQ bars */
  .wavebars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 22px;
  }
  .wavebar {
    width: 3px;
    border-radius: 2px;
    background: #7F77DD;
    animation: waveAnim 1.0s ease-in-out infinite alternate;
  }
  .wavebar:nth-child(1) { height: 8px;  animation-delay: 0s;    }
  .wavebar:nth-child(2) { height: 16px; animation-delay: 0.10s; }
  .wavebar:nth-child(3) { height: 22px; animation-delay: 0.20s; background: #534AB7; }
  .wavebar:nth-child(4) { height: 14px; animation-delay: 0.30s; }
  .wavebar:nth-child(5) { height: 20px; animation-delay: 0.15s; background: #1D9E75; }
  .wavebar:nth-child(6) { height: 10px; animation-delay: 0.25s; }
  .wavebar:nth-child(7) { height: 17px; animation-delay: 0.05s; }
  @keyframes waveAnim {
    from { transform: scaleY(0.2); }
    to   { transform: scaleY(1); }
  }

  /* Tagline */
  .tagline {
    font-size: 10.5px;
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--tagline);
    text-transform: uppercase;
    animation: taglinePulse 3.2s ease-in-out infinite;
  }
  .tagline .accent { color: #1D9E75; font-weight: 400; }
  @keyframes taglinePulse {
    0%, 35%, 100% { opacity: 1; }
    65%            { opacity: 0.4; }
  }

  /* Looping progress bar */
  .progress-wrap {
    width: 200px; height: 2px;
    background: var(--prog-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #534AB7, #1D9E75);
    animation: loopBar 2.4s cubic-bezier(.4,0,.2,1) infinite;
  }
  @keyframes loopBar {
    0%   { width: 0%;   transform: translateX(0%); }
    50%  { width: 100%; transform: translateX(0%); }
    51%  { width: 100%; transform: translateX(0%); }
    100% { width: 100%; transform: translateX(101%); }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="rings">
  <div class="ring"></div><div class="ring"></div>
  <div class="ring"></div><div class="ring"></div>
</div>

<div class="stage">

  <!-- Wordmark only — no top icon -->
  <div class="wordmark-wrap">
    <div class="glow-blob"></div>

    <span class="letter lv">V</span>

    <span class="mic-letter">
      <svg width="54" height="72" viewBox="0 0 54 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="27" cy="29" rx="20" ry="24" stroke="#CECBF6" stroke-width="7"/>
        <rect x="19" y="10" width="16" height="32" rx="8" fill="#AFA9EC"/>
        <rect class="mic-active-bar" x="23" y="17" width="8" height="14" rx="4" fill="#1D9E75"/>
        <path d="M16 52 Q16 65 27 65 Q38 65 38 52" stroke="#CECBF6" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </span>

    <span class="letter lc">C</span>
    <span class="letter la">A</span>
  </div>

  <!-- EQ bars -->
  <div class="wavebars">
    <div class="wavebar"></div><div class="wavebar"></div>
    <div class="wavebar"></div><div class="wavebar"></div>
    <div class="wavebar"></div><div class="wavebar"></div>
    <div class="wavebar"></div>
  </div>

  <!-- Tagline -->
  <div class="tagline">Read Anything. <span class="accent">Listen Anywhere.</span></div>

  <!-- Looping bar -->
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

</div>

<script>
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  let W, H;
  const dark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['#534AB7','#7F77DD','#AFA9EC','#1D9E75','#CECBF6'];
  const dots = Array.from({ length: 55 }, () => ({
    x:     Math.random() * window.innerWidth,
    y:     Math.random() * window.innerHeight,
    r:     Math.random() * 1.6 + 0.4,
    vx:    (Math.random() - 0.5) * 0.28,
    vy:    (Math.random() - 0.5) * 0.28,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    base:  Math.random() * 0.35 + 0.07
  }));

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const scale = dark() ? 2.0 : 0.65;
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if (d.x < 0) d.x = W; if (d.x > W) d.x = 0;
      if (d.y < 0) d.y = H; if (d.y > H) d.y = 0;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = d.color;
      ctx.globalAlpha = d.base * scale;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    document.documentElement.style.setProperty('--bg', dark() ? '#0e0b1f' : '#ffffff');
  });
</script>
</body>
</html>
